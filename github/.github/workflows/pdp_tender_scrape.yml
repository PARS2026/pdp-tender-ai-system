name: PDP Tender Scrape

on:
  workflow_dispatch:
    inputs:
      from_date:
        description: 'Jalali start date, e.g. 1405-04-16'
        required: true
        default: '1405-04-16'
      to_date:
        description: 'Jalali end date, e.g. 1405-04-17'
        required: true
        default: '1405-04-17'
      sources:
        description: 'Comma-separated: hezareh_tenders,hezareh_inquiries,parsnamad_tenders,parsnamad_inquiries'
        required: true
        default: 'hezareh_tenders,hezareh_inquiries,parsnamad_tenders,parsnamad_inquiries'
      max_pages:
        description: 'Maximum pages per source'
        required: true
        default: '60'
      delay_seconds:
        description: 'Delay between requests'
        required: true
        default: '2'
      retries:
        description: 'Retries per page'
        required: true
        default: '3'
  schedule:
    # Optional fallback daily schedule. Apps Script can also trigger workflow_dispatch.
    - cron: '30 3 * * *'

permissions:
  contents: write
  actions: read

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve defaults for scheduled runs
        id: vars
        shell: bash
        run: |
          FROM_DATE="${{ github.event.inputs.from_date }}"
          TO_DATE="${{ github.event.inputs.to_date }}"
          SOURCES="${{ github.event.inputs.sources }}"
          MAX_PAGES="${{ github.event.inputs.max_pages }}"
          DELAY="${{ github.event.inputs.delay_seconds }}"
          RETRIES="${{ github.event.inputs.retries }}"
          if [ -z "$FROM_DATE" ]; then FROM_DATE="1405-04-16"; fi
          if [ -z "$TO_DATE" ]; then TO_DATE="1405-04-17"; fi
          if [ -z "$SOURCES" ]; then SOURCES="hezareh_tenders,hezareh_inquiries,parsnamad_tenders,parsnamad_inquiries"; fi
          if [ -z "$MAX_PAGES" ]; then MAX_PAGES="60"; fi
          if [ -z "$DELAY" ]; then DELAY="2"; fi
          if [ -z "$RETRIES" ]; then RETRIES="3"; fi
          echo "from_date=$FROM_DATE" >> "$GITHUB_OUTPUT"
          echo "to_date=$TO_DATE" >> "$GITHUB_OUTPUT"
          echo "sources=$SOURCES" >> "$GITHUB_OUTPUT"
          echo "max_pages=$MAX_PAGES" >> "$GITHUB_OUTPUT"
          echo "delay=$DELAY" >> "$GITHUB_OUTPUT"
          echo "retries=$RETRIES" >> "$GITHUB_OUTPUT"

      - name: Run PDP scraper
        run: |
          python scripts/pdp_scrape.py \
            --from-date "${{ steps.vars.outputs.from_date }}" \
            --to-date "${{ steps.vars.outputs.to_date }}" \
            --sources "${{ steps.vars.outputs.sources }}" \
            --max-pages "${{ steps.vars.outputs.max_pages }}" \
            --delay-seconds "${{ steps.vars.outputs.delay }}" \
            --retries "${{ steps.vars.outputs.retries }}" \
            --out-dir outputs

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pdp-tender-outputs
          path: outputs/
          if-no-files-found: error
          retention-days: 30

      - name: Commit outputs
        run: |
          git config user.name "pdp-tender-bot"
          git config user.email "pdp.ai.database@gmail.com"
          git add outputs
          git commit -m "Update PDP tender outputs" || echo "No changes to commit"
          git push
